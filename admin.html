<!--
  ADMIN.HTML — TARGETED PATCHES
  Apply these changes to admin.html. Each patch is labelled with what it fixes.
  The full admin.html is too large to rewrite entirely; these are surgical CSS + HTML + JS patches.
-->

<!-- ══════════════════════════════════════════════════════════════
  PATCH 1: CSS FIXES — add these rules to the existing <style> block
  (append before the closing </style> tag)
  ══════════════════════════════════════════════════════════════ -->
<style id="admin-patches-css">

/* ── FIX: Stat grid — controlled breakpoints instead of auto-fill chaos ── */
.stat-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);  /* mobile: always 2 cols */
  gap:12px;
  margin-bottom:24px;
}
@media(min-width:600px){.stat-grid{grid-template-columns:repeat(3,1fr);}}
@media(min-width:900px){.stat-grid{grid-template-columns:repeat(5,1fr);}}

/* ── FIX: page-header spacing — title and subtitle had margin-bottom:3px (nothing) ── */
.page-title{font-family:"DM Serif Display",serif;font-size:28px;color:var(--text);margin-bottom:6px;}
.page-sub{font-size:13px;color:var(--muted);margin-top:0;line-height:1.5;}

/* ── FIX: Notification bell — anchored properly in sidebar flow ── */
/* Remove the floating .notif-btn treatment, restyle as a proper sidebar item */
.notif-btn{
  display:flex;align-items:center;gap:8px;
  margin:6px 8px 2px;
  padding:9px 13px;
  border-radius:8px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  color:rgba(255,255,255,0.75);
  font-size:12px;font-weight:600;
  cursor:pointer;
  font-family:"DM Sans",sans-serif;
  transition:all 0.15s;
  position:relative;
  text-decoration:none;
}
.notif-btn:hover{background:rgba(255,255,255,0.12);color:white;border-color:rgba(255,255,255,0.2);}
.notif-dot{width:7px;height:7px;background:var(--danger);border-radius:50%;flex-shrink:0;}
#notifCount{font-size:11px;font-weight:700;color:var(--gold);}

/* ── FIX: Sidebar emoji icons — wrap all nav-item content so icon + text align cleanly ── */
/* We can't swap emoji to SVG without touching every nav-item, but we can at least
   make them consistent in size and vertical alignment */
.nav-item{
  display:flex;align-items:center;gap:9px;
  padding:9px 13px;border-radius:8px;margin:1px 8px;
  cursor:pointer;font-size:13px;color:rgba(255,255,255,0.65);
  font-weight:500;transition:all 0.15s;position:relative;text-decoration:none;
  line-height:1.3;
}
/* Emoji in nav items: pin to 16px so they don't vary by OS */
.nav-item > span:first-child, .nav-item::first-line{font-size:14px;}

/* ── FIX: Grading queue email template placeholder text — hide [PASS/FAIL] before grading ──
   Applied via JS below; CSS hides the confusing placeholder state */
.grade-email-pending{opacity:0.4;pointer-events:none;filter:blur(1px);}
.grade-email-ready{opacity:1;pointer-events:auto;filter:none;transition:all 0.3s;}

/* ── FIX: Mobile sidebar — hamburger button and overlay ── */
.mob-menu-btn{
  display:none;
  align-items:center;justify-content:center;
  width:36px;height:36px;
  background:none;border:1.5px solid var(--border);
  border-radius:8px;cursor:pointer;
  color:var(--muted);font-size:18px;
  flex-shrink:0;
  position:fixed;top:12px;left:12px;z-index:500;
  background:var(--white);
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}
@media(max-width:800px){
  .mob-menu-btn{display:flex;}
  .sidebar{transform:translateX(-100%);transition:transform 0.28s cubic-bezier(0.4,0,0.2,1);}
  .sidebar.open{transform:translateX(0);}
  .mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:99;backdrop-filter:blur(2px);}
  .mob-overlay.show{display:block;}
  .main{margin-left:0;padding:72px 16px 24px;max-width:100%;}
  /* Tighter cards on mobile */
  .card{padding:16px;}
  .page-title{font-size:22px;}
  .stat-val{font-size:26px;}
  /* Table: hide less critical columns on mobile */
  table th:nth-child(4),table td:nth-child(4),
  table th:nth-child(5),table td:nth-child(5){display:none;}
}

/* ── FIX: Dashboard two-column grid — collapse properly on mobile ── */
@media(max-width:700px){
  #page-dashboard > div[style*="grid-template-columns:1fr 1fr"]{
    display:grid!important;
    grid-template-columns:1fr!important;
  }
}

/* ── FIX: test-mode-banner sticky doesn't fight admin shell z-index ── */
.test-mode-banner{
  display:none;background:#DC2626;color:white;
  text-align:center;padding:8px 16px;font-size:12px;font-weight:700;
  letter-spacing:0.5px;width:100%;position:sticky;top:0;z-index:200;
}
.test-mode-banner.on{display:block;}

/* ── IMPROVED: App card actions spacing on mobile ── */
@media(max-width:600px){
  .app-actions{gap:6px;}
  .app-actions .btn{font-size:12px;padding:8px 12px;}
  .app-time{margin-left:0;margin-top:6px;width:100%;}
}

/* ── IMPROVED: Grading queue – score inputs more visible ── */
input[id^="wscore-"]{
  border:2px solid var(--gold)!important;
  background:var(--gold-light)!important;
  font-weight:700!important;
  color:var(--navy)!important;
}
input[id^="wscore-"]:focus{border-color:var(--navy)!important;outline:none;}

</style>

<!-- ══════════════════════════════════════════════════════════════
  PATCH 2: HTML — add mobile hamburger button and overlay
  Place this immediately BEFORE the <div id="adminShell"> opening tag
  ══════════════════════════════════════════════════════════════ -->
<button class="mob-menu-btn" id="mobMenuBtn" onclick="toggleMobMenu()" aria-label="Open menu">
  ☰
</button>
<div class="mob-overlay" id="mobOverlay" onclick="closeMobMenu()"></div>

  Find this in admin.html:
    <div class="notif-btn" onclick="goPage('dashboard')" id="notifBell">🔔 <span id="notifCount" style="font-weight:700;"></span></div>
  Replace with:
  ══════════════════════════════════════════════════════════════ -->

<!-- ══════════════════════════════════════════════════════════════
  PATCH 4: JS — add these functions to the <script> block in admin.html
  ══════════════════════════════════════════════════════════════ -->
<script id="admin-patches-js">

// ── Mobile menu toggle ────────────────────────────────────────
function toggleMobMenu() {
  var sb = document.querySelector('.sidebar');
  var ov = document.getElementById('mobOverlay');
  if (!sb) return;
  var isOpen = sb.classList.contains('open');
  if (isOpen) { sb.classList.remove('open'); if(ov) ov.classList.remove('show'); }
  else { sb.classList.add('open'); if(ov) ov.classList.add('show'); }
}
function closeMobMenu() {
  var sb = document.querySelector('.sidebar');
  var ov = document.getElementById('mobOverlay');
  if (sb) sb.classList.remove('open');
  if (ov) ov.classList.remove('show');
}
// Close sidebar when a nav-item is clicked on mobile
document.addEventListener('click', function(e) {
  if (window.innerWidth <= 800 && e.target.closest('.nav-item')) { closeMobMenu(); }
});

// ── Updated updateBadges — also show/hide the notif dot ─────
// REPLACES the existing updateBadges() function
function updateBadges() {
  var pending = allApplications.filter(function(a){ return a.status === 'pending'; }).length;
  var atRisk = allStudents.filter(isAtRisk).length;
  var navApp = document.getElementById('navApplications');
  if (navApp) navApp.innerHTML = '📋 Applications' + (pending > 0 ? '<span class="nav-badge">' + pending + '</span>' : '');
  var navAt = document.getElementById('navAtrisk');
  if (navAt) navAt.innerHTML = '⚠️ At-Risk Students' + (atRisk > 0 ? '<span class="nav-badge">' + atRisk + '</span>' : '');
  var total = pending + atRisk;
  var bell = document.getElementById('notifCount');
  var dot = document.getElementById('notifDot');
  if (bell) bell.textContent = total > 0 ? total + ' alert' + (total > 1 ? 's' : '') : '';
  if (dot) dot.style.display = total > 0 ? 'inline-block' : 'none';
}

// ── Grading queue: hide raw email template until grade decision made ────
// PATCH for renderGrading() — after it renders, blur email fields
// Call this after renderGrading() resolves:
function applyGradingUX() {
  document.querySelectorAll('[id^="gemail-subj-"],[id^="gemail-body-"]').forEach(function(el) {
    el.classList.add('grade-email-pending');
    var card = el.closest('.card');
    if (!card) return;
    // Un-blur when admin clicks Pass or Fail
    var btns = card.querySelectorAll('[data-result]');
    btns.forEach(function(btn) {
      btn.addEventListener('mouseenter', function() {
        card.querySelectorAll('.grade-email-pending').forEach(function(e2) {
          e2.classList.add('grade-email-ready');
        });
      }, { once: false });
    });
  });
}
// Wrap the existing renderGrading — patch it to call applyGradingUX after render
var _origRenderGrading = typeof renderGrading !== 'undefined' ? renderGrading : null;
// This executes after the main script loads:
window.addEventListener('load', function() {
  if (typeof renderGrading === 'function') {
    var orig = renderGrading;
    renderGrading = async function() {
      await orig.call(this);
      setTimeout(applyGradingUX, 200);
    };
  }
});

</script>

<!-- ══════════════════════════════════════════════════════════════
  PATCH 5: SUMMARY OF ALL CHANGES
  ══════════════════════════════════════════════════════════════

  1. Stat grid: now 2→3→5 cols at controlled breakpoints. No more janky auto-fill.
  2. Page header: page-sub now has margin-top:0 and line-height:1.5. Title/subtitle
     no longer collapse into one compressed block.
  3. Notification bell: properly styled as a sidebar item with a live dot indicator.
     No longer floats awkwardly above the section labels.
  4. Mobile sidebar: hamburger button (fixed, top-left) + dark overlay. Admin can
     now navigate on phone. Sidebar slides in with cubic-bezier ease. Nav-item clicks
     auto-close the drawer.
  5. Grading queue email template: fields are blurred until the admin hovers
     Pass/Fail, making it clear the template updates on grading action.
     Score inputs are visually accented (gold border) to distinguish them.
  6. Dashboard two-column grid collapses to single column on <700px.
  7. Table: 4th and 5th columns hidden on mobile (last login, applied date) to
     prevent horizontal scroll in the students table.
  8. App card actions: better gap and font sizes on mobile.
